<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Muskaan's Maths</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #e0e8f6;
            color: #3c4858;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            max-width: 450px;
            padding: 40px 32px;
            border-radius: 28px;
            background: #e0e8f6;
            box-shadow: 9px 9px 16px #bec8d6, -9px -9px 16px #ffffff;
        }
        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #e0e8f6;
            box-shadow: inset 4px 4px 8px #bec8d6, inset -4px -4px 8px #ffffff;
            color: #4d7cfe;
            font-size: 2rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 12px; font-weight: 700; }
        p { color: #718096; font-size: 0.95rem; line-height: 1.5; margin-bottom: 24px; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: #e0e8f6;
            box-shadow: 4px 4px 8px #bec8d6, -4px -4px 8px #ffffff;
            color: #4d7cfe;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:active { box-shadow: inset 3px 3px 6px #bec8d6, inset -3px -3px 6px #ffffff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-container">
            <i class="fa-solid fa-wifi-slash"></i>
        </div>
        <h1>No Active Network Connection</h1>
        <p>Aap offline hain, par chinta na karein! Muskaan's Maths cached application module fully ready hai. Jab network wapas aayega ye page automatic reload ho jayega.</p>
        <button class="btn" onclick="window.location.reload()">
            <i class="fa-solid fa-rotate-right"></i> Try Reconnecting
        </button>
    </div>
    <script>
        window.addEventListener('online', () => window.location.reload());
    </script>
</body>
</html>
